apiVersion: v1
kind: ConfigMap
metadata:
  name: seerr-service-config
  namespace: media          # TODO: match Deployment namespace
data:
  # AWS
  AWS_REGION: "us-east-1"
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/123456789012/seerr-requests"  # TODO: replace
  SQS_MAX_MESSAGES: "10"
  SQS_VISIBILITY_TIMEOUT: "30"
  SQS_WAIT_TIME_SECONDS: "20"
  SQS_POLLING_INTERVAL_MS: "500"

  # Seerr
  SEERR_BASE_URL: "http://overseerr.media.svc.cluster.local:5055"  # TODO: replace with actual URL

  # Service
  LOG_LEVEL: "info"
  HEALTH_PORT: "8080"
