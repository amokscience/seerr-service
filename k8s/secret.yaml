# IMPORTANT: Do NOT commit real values to source control.
# Use a secrets manager (e.g. Sealed Secrets, External Secrets Operator,
# AWS Secrets Manager CSI driver) instead of storing plaintext here.
#
# To create manually for local testing only:
#   kubectl create secret generic seerr-service-secret \
#     --namespace=media \
#     --from-literal=seerr-api-key=<YOUR_API_KEY>
apiVersion: v1
kind: Secret
metadata:
  name: seerr-service-secret
  namespace: media          # TODO: match Deployment namespace
type: Opaque
data:
  # base64-encoded values.  Replace with your actual encoded key:
  #   echo -n 'your-api-key' | base64
  seerr-api-key: ""         # TODO: fill in or manage via external secrets
